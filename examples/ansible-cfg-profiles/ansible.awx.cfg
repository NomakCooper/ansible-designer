[defaults]
inventory = ./inventory/hosts.yml
roles_path = ./roles
collections_path = ./collections
host_key_checking = True
forks = 25
timeout = 30
retry_files_enabled = False
stdout_callback = yaml
gathering = smart
fact_caching = memory

[privilege_escalation]
become = True
become_method = sudo
become_user = root

[ssh_connection]
pipelining = True
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s
