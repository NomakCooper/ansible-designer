---
# tasks/main.yml — baseline role

- name: Assert OS family is supported
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'RedHat'
      - ansible_distribution_major_version | int >= 8
    fail_msg: "baseline role supports RHEL/Rocky/Alma 8+. Found: {{ ansible_distribution }} {{ ansible_distribution_version }}"
  tags:
    - baseline
    - validate

- name: Install baseline packages
  ansible.builtin.dnf:
    name: "{{ baseline_packages }}"
    state: present
  tags:
    - baseline
    - install

- name: Ensure example sysctl directory exists
  ansible.builtin.file:
    path: /tmp/sysctl.d
    state: directory
    mode: "0755"
  when: baseline_manage_sysctl | bool
  tags:
    - baseline
    - configure

- name: Ensure example limits directory exists
  ansible.builtin.file:
    path: /tmp/security-limits
    state: directory
    mode: "0755"
  when: baseline_manage_limits | bool
  tags:
    - baseline
    - configure

- name: Apply sysctl hardening settings
  ansible.builtin.copy:
    dest: "/tmp/sysctl.d/{{ item.key | replace('.', '_') }}.conf"
    content: "{{ item.key }} = {{ item.value }}\n"
    mode: "0644"
  loop: "{{ baseline_sysctl | dict2items }}"
  when: baseline_manage_sysctl | bool
  tags:
    - baseline
    - configure
    - security

- name: Configure system resource limits
  ansible.builtin.copy:
    dest: "/tmp/security-limits/{{ item.domain | regex_replace('[^A-Za-z0-9_-]', '_') }}-{{ item.item }}-{{ item.type }}.conf"
    content: "{{ item.domain }} {{ item.type }} {{ item.item }} {{ item.value }}\n"
    mode: "0644"
  loop: "{{ baseline_limits }}"
  when: baseline_manage_limits | bool
  tags:
    - baseline
    - configure
